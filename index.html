<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Race Control | Historical Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --f1-red: #e10600; --bg: #050505; --panel: #111114; --border: #2b2b30; --text: #f0f0f2; --text-dim: #71717a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        aside { width: 360px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .search-box { padding: 20px; border-bottom: 1px solid var(--border); background: #00000033; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; background: #1c1c21; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; font-size: 0.85rem; }
        .btn-search { width: 100%; background: var(--f1-red); color: white; border: none; padding: 12px; font-weight: 800; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn-search:hover { filter: brightness(1.2); }
        #session-list { flex: 1; overflow-y: auto; padding: 15px; }
        .session-item { background: #1c1c21; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .session-item:hover { border-color: var(--f1-red); }

        /* Dashboard */
        main { flex: 1; display: flex; flex-direction: column; }
        .status-bar { height: 70px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        .playback-controls { display: flex; align-items: center; gap: 20px; background: #1c1c21; padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border); }
        #lap-num { font-family: 'JetBrains Mono'; font-size: 1.5rem; font-weight: 800; color: var(--f1-red); }

        .content-grid { flex: 1; display: grid; grid-template-columns: 1fr 380px; grid-template-rows: 1fr 300px; gap: 15px; padding: 15px; }
        .widget { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .widget-header { padding: 10px 15px; background: #1c1c21; border-bottom: 1px solid var(--border); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-dim); }
        .widget-body { flex: 1; overflow-y: auto; padding: 10px; }

        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 0.75rem; }
        th { text-align: left; color: var(--text-dim); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; border-bottom: 1px solid #1c1c21; }
        .pos-badge { background: #25252b; padding: 2px 6px; border-radius: 3px; font-weight: 800; }
        .pos-p1 { background: var(--f1-red); color: white; }

        .log-entry { font-size: 0.7rem; padding: 8px; border-left: 3px solid var(--f1-red); background: #1c1c21; margin-bottom: 5px; }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <h2 style="margin:0; color:var(--f1-red); font-size: 1.2rem;">RACE_CONTROL_V2</h2>
            <span style="font-size: 0.6rem; color: var(--text-dim);">SYSTEM STATUS: ONLINE</span>
        </div>
        <div class="search-box">
            <div class="input-group">
                <label>Archive Year</label>
                <select id="year-in"><option value="2024">2024</option><option value="2023" selected>2023</option></select>
            </div>
            <div class="input-group">
                <label>Country (Optional)</label>
                <input type="text" id="country-in" placeholder="e.g. Italy, Spain...">
            </div>
            <button class="btn-search" id="do-search">LOAD ARCHIVES</button>
        </div>
        <div id="session-list"></div>
    </aside>

    <main>
        <div class="status-bar">
            <div>
                <h3 id="current-event" style="margin:0">SELECT SESSION</h3>
                <span id="circuit-info" style="font-size: 0.7rem; color: var(--text-dim);">NO ACTIVE TELEMETRY</span>
            </div>
            <div class="playback-controls">
                <button id="play-btn" style="background:none; border:1px solid var(--border); color:white; cursor:pointer; padding:5px 15px;">PLAY</button>
                <div id="lap-num">LAP 0</div>
                <input type="range" id="lap-range" min="1" value="1">
            </div>
        </div>

        <div class="content-grid">
            <div class="widget" style="grid-row: span 2;">
                <div class="widget-header">Live Classification</div>
                <div class="widget-body">
                    <table id="leaderboard">
                        <thead><tr><th>POS</th><th>DRIVER</th><th>GAP</th><th>PACE</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="widget">
                <div class="widget-header">Race Control Messages</div>
                <div class="widget-body" id="log-feed"></div>
            </div>
            <div class="widget">
                <div class="widget-header">Telemetry Focus</div>
                <div class="widget-body">
                    <table id="tele-table">
                        <thead><tr><th>LAP</th><th>S1</th><th>S2</th><th>S3</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
