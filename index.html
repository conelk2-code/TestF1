<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Replay | Historical Data</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --f1-red: #ff1801; --bg: #050505; --panel: #111114; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; }
        .header { border-bottom: 2px solid var(--f1-red); padding-bottom: 10px; margin-bottom: 30px; display: flex; justify-content: space-between; }
        
        .controls { background: var(--panel); padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr 150px; gap: 10px; margin-bottom: 20px; }
        
        input, button { background: #1a1a1f; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; }
        button { background: var(--f1-red); cursor: pointer; font-weight: bold; border: none; }
        button:hover { filter: brightness(1.2); }

        .dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .sidebar { background: var(--panel); padding: 15px; border-radius: 8px; max-height: 500px; overflow-y: auto; }
        .main-view { background: var(--panel); padding: 25px; border-radius: 8px; min-height: 400px; position: relative; }

        .session-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.8rem; }
        .session-item:hover { background: #1c1c22; }
        
        .lap-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .lap-num { color: var(--f1-red); font-weight: bold; }
        
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--f1-red); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div><strong>F1_HISTORICAL_REPLAY</strong> v1.0</div>
        <div id="session-clock" style="color: #666;">SESSION_TIME: 0s</div>
    </div>

    <div class="controls">
        <input type="number" id="year" value="2023" min="2023" max="2026">
        <input type="text" id="country" placeholder="Country (e.g. Monza)">
        <button onclick="findSessions()">FIND SESSIONS</button>
    </div>

    <div class="dashboard">
        <div class="sidebar" id="sessionList">
            <p class="label" style="color:#666; font-size: 0.7rem;">SEARCH RESULTS WILL APPEAR HERE</p>
        </div>
        <div class="main-view" id="mainView">
            <div id="instructions">
                <h3>Telemetry Replay Mode</h3>
                <p>1. Search for a year and location.</p>
                <p>2. Select a Session Key from the sidebar.</p>
                <p>3. Analyze historical lap times retrieved from OpenF1.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let clock = 0;
    setInterval(() => { document.getElementById('session-clock').innerText = `SESSION_TIME: ${++clock}s`; }, 1000);

    // Find sessions based on year/location
    async function findSessions() {
        const year = document.getElementById('year').value;
        const country = document.getElementById('country').value;
        const list = document.getElementById('sessionList');
        
        list.innerHTML = "Searching...";
        
        try {
            let url = `https://api.openf1.org/v1/sessions?year=${year}`;
            if(country) url += `&country_name=${country}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            list.innerHTML = "";
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-item';
                div.innerHTML = `<strong>${s.session_name}</strong><br>${s.location} (${s.session_key})`;
                div.onclick = () => loadLapData(s.session_key, s.session_name);
                list.appendChild(div);
            });
        } catch (e) { list.innerHTML = "Error fetching data."; }
    }

    // Load lap times for the chosen session
    async function loadLapData(key, name) {
        const view = document.getElementById('mainView');
        view.innerHTML = `<div class="loading">RETRIEVING LAP DATA FOR KEY: ${key}...</div>`;
        
        try {
            // Fetching Laps (Historical Replay)
            // Note: We limit to first 50 results to keep it fast
            const res = await fetch(`https://api.openf1.org/v1/laps?session_key=${key}`);
            const data = await res.json();
            
            view.innerHTML = `<h3>${name} - Lap Analysis</h3>`;
            
            if (data.length === 0) {
                view.innerHTML += "<p>No lap data found for this session.</p>";
                return;
            }

            // Create a table-like view of the replay data
            const head = document.createElement('div');
            head.className = 'lap-row';
            head.style.fontWeight = 'bold';
            head.innerHTML = `<span>DRIVER #</span><span>LAP</span><span>DURATION</span>`;
            view.appendChild(head);

            // Show first 30 lap records as a "replay" feed
            data.slice(0, 30).forEach(lap => {
                const row = document.createElement('div');
                row.className = 'lap-row';
                row.innerHTML = `
                    <span>#${lap.driver_number}</span>
                    <span class="lap-num">LAP ${lap.lap_number}</span>
                    <span>${lap.lap_duration ? lap.lap_duration.toFixed(3) + 's' : 'N/A'}</span>
                `;
                view.appendChild(row);
            });
            
            view.innerHTML += `<p style="margin-top:20px; color:#666; font-size:0.8rem;">+ ${data.length - 30} more laps recorded.</p>`;
            
        } catch (e) { view.innerHTML = "Error loading lap telemetry."; }
    }
</script>

</body>
</html>
