<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control | Ultimate Replay Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --bg-deep: #050505;
            --panel-bg: rgba(20, 20, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f2;
            --text-dim: #71717a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Integrated Control Bar */
        header {
            height: 100px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 40px;
            z-index: 100;
        }

        .brand { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; color: var(--f1-red); }
        
        .playback-engine {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid var(--border);
        }

        .btn-play {
            background: var(--f1-red);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 800;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #time-slider {
            flex: 1;
            accent-color: var(--f1-red);
            cursor: pointer;
            height: 6px;
        }

        #lap-indicator {
            font-family: 'JetBrains Mono';
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--f1-red);
            min-width: 120px;
        }

        /* Main Widescreen Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            grid-template-rows: 1fr 300px;
            gap: 20px;
            padding: 20px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 25px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .panel-body { flex: 1; overflow-y: auto; padding: 20px; }

        /* Leaderboard */
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-dim); padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.3s; cursor: pointer; }
        tr:hover td { background: rgba(225, 6, 0, 0.05); }

        /* Driver Profile */
        .driver-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 30px;
        }
        .driver-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--f1-red);
            margin-bottom: 20px;
            background: #25252b;
            object-fit: cover;
        }
        .driver-name { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; }
        .team-tag { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px; }

        /* Archive Search Side */
        .search-area { display: flex; flex-direction: column; gap: 15px; }
        input, select {
            background: #1a1a21; border: 1px solid var(--border); color: white;
            padding: 12px 15px; border-radius: 8px; width: 100%;
        }

        .log-entry { font-size: 0.75rem; padding: 10px; border-left: 3px solid var(--f1-red); background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">RACE_CONTROL_V5</div>
        
        <div class="playback-engine">
            <button class="btn-play" id="btn-master-play">▶</button>
            <div id="lap-indicator">LAP 01</div>
            <input type="range" id="time-slider" min="1" value="1">
            <div style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--text-dim);" id="time-total">/ 00 LAPS</div>
        </div>

        <div style="text-align: right;">
            <div id="active-event" style="font-weight: 800; font-size: 1rem;">AWAITING SELECTION</div>
            <div id="active-location" style="font-size: 0.7rem; color: var(--text-dim);">SYSTEM OFFLINE</div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="panel" style="grid-row: span 2;">
            <div class="panel-header">Historical Archives</div>
            <div class="panel-body">
                <div class="search-area">
                    <input type="text" id="input-country" placeholder="Country (e.g. Italy, Monaco)">
                    <select id="select-year">
                        <option value="2024">2024 Season</option>
                        <option value="2023" selected>2023 Season</option>
                    </select>
                    <button class="btn-play" id="btn-fetch" style="width: 100%; border-radius: 8px; height: 45px;">SYNC TELEMETRY</button>
                </div>
                <div id="session-results" style="margin-top: 30px;"></div>
            </div>
        </div>

        <div class="panel" style="grid-row: span 2;">
            <div class="panel-header">Live Classification Engine</div>
            <div class="panel-body">
                <table id="leaderboard">
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>DRIVER</th>
                            <th>GAP</th>
                            <th>LAST LAP</th>
                            <th>TYRE</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Driver Telemetry Focus</div>
            <div class="panel-body" id="driver-focus">
                <div class="driver-profile">
                    <div class="driver-img"></div>
                    <div class="driver-name">SELECT DRIVER</div>
                    <div class="team-tag">NO ACTIVE DATA</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Race Control Feed</div>
            <div class="panel-body" id="log-feed">
                <div class="log-entry">SYSTEM_READY: Waiting for session initialization...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
