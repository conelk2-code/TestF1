<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Archive & Replay Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --f1-red: #e10600; --bg: #0b0b0d; --card: #15151e; --text: #f5f5f5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        nav { width: 320px; background: var(--card); border-right: 1px solid #2d2d3a; display: flex; flex-direction: column; }
        .nav-header { padding: 20px; border-bottom: 1px solid #2d2d3a; }
        .search-box { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        input, select, button { background: #0b0b0d; border: 1px solid #333; color: white; padding: 10px; border-radius: 4px; }
        button { background: var(--f1-red); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff1801; }

        #sessionList { overflow-y: auto; flex-grow: 1; }
        .session-btn { 
            padding: 15px; border-bottom: 1px solid #2d2d3a; cursor: pointer; font-size: 0.85rem; 
            transition: 0.2s; border-left: 3px solid transparent; 
        }
        .session-btn:hover { background: #1f1f2a; border-left-color: var(--f1-red); }

        /* Main Content */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #2d2d3a; }
        
        h2 { margin-top: 0; color: var(--f1-red); font-size: 1.2rem; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        th { text-align: left; color: #666; padding-bottom: 10px; }
        td { padding: 8px 0; border-bottom: 1px solid #2d2d3a; }

        .badge { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
        .loading-overlay { display: none; color: var(--f1-red); font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-header">
            <h1 style="font-size: 1.2rem; margin: 0;">F1_ARCHIVE</h1>
            <p style="font-size: 0.7rem; color: #666;">HISTORICAL DATA EXPLORER</p>
        </div>
        <div class="search-box">
            <select id="year">
                <option value="2026">2026 Season</option>
                <option value="2025">2025 Season</option>
                <option value="2024">2024 Season</option>
                <option value="2023" selected>2023 Season</option>
            </select>
            <input type="text" id="location" placeholder="Country or City...">
            <button onclick="fetchSessions()">SEARCH RACE</button>
        </div>
        <div id="sessionList"></div>
    </nav>

    <main id="mainDisplay">
        <div style="text-align: center; margin-top: 100px; color: #444;">
            <h2>Select a Race to Begin</h2>
            <p>Choose a session from the left menu to pull telemetry and standings.</p>
        </div>
    </main>

<script>
    const api = "https://api.openf1.org/v1";

    async function fetchSessions() {
        const yr = document.getElementById('year').value;
        const loc = document.getElementById('location').value;
        const list = document.getElementById('sessionList');
        list.innerHTML = "<p style='padding:20px'>Loading...</p>";

        try {
            let url = `${api}/sessions?year=${yr}`;
            if(loc) url += `&country_name=${loc}`;
            const res = await fetch(url);
            const data = await res.json();

            list.innerHTML = "";
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-btn';
                div.innerHTML = `<strong>${s.session_name}</strong><br><span style="color:#666">${s.location}</span>`;
                div.onclick = () => loadRaceData(s);
                list.appendChild(div);
            });
        } catch (e) { list.innerHTML = "Error fetching sessions."; }
    }

    async function loadRaceData(session) {
        const main = document.getElementById('mainDisplay');
        main.innerHTML = `<h2>Loading ${session.session_name}...</h2>`;

        try {
            // Parallel Fetch: Standings and Laps
            const [posRes, lapRes] = await Promise.all([
                fetch(`${api}/position?session_key=${session.session_key}`),
                fetch(`${api}/laps?session_key=${session.session_key}`)
            ]);

            const posData = await posRes.json();
            const lapData = await lapRes.json();

            // Get Unique Drivers for Leaderboard (Latest Position)
            const uniqueDrivers = Array.from(new Set(posData.map(p => p.driver_number)));
            const leaderboard = uniqueDrivers.map(num => {
                const updates = posData.filter(p => p.driver_number === num);
                return updates[updates.length - 1];
            }).sort((a, b) => a.position - b.position);

            renderDashboard(session, leaderboard, lapData);
        } catch (e) {
            main.innerHTML = "<h2>Error loading race data.</h2>";
        }
    }

    function renderDashboard(session, leaderboard, laps) {
        const main = document.getElementById('mainDisplay');
        main.innerHTML = `
            <div>
                <h1 style="margin:0">${session.meeting_name}</h1>
                <p style="color:#666">${session.circuit_short_name} | ${new Date(session.date_start).toDateString()}</p>
            </div>

            <div class="stats-grid">
                <div class="panel">
                    <h2>Leaderboard</h2>
                    <table>
                        <thead><tr><th>POS</th><th>DRIVER #</th><th>DATE/TIME</th></tr></thead>
                        <tbody>
                            ${leaderboard.slice(0, 15).map(p => `
                                <tr>
                                    <td><span class="badge">${p.position}</span></td>
                                    <td>#${p.driver_number}</td>
                                    <td>${new Date(p.date).toLocaleTimeString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="panel">
                    <h2>Fastest Lap Replay (Sample)</h2>
                    <table>
                        <thead><tr><th>LAP</th><th>DRIVER</th><th>TIME</th></tr></thead>
                        <tbody>
                            ${laps.filter(l => l.lap_duration).slice(0, 15).map(l => `
                                <tr>
                                    <td class="badge">${l.lap_number}</td>
                                    <td>#${l.driver_number}</td>
                                    <td style="color:var(--f1-red)">${l.lap_duration.toFixed(3)}s</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    fetchSessions(); // Load 2023 by default
</script>
</body>
</html>
