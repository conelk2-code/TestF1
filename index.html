<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control | F1 Intelligence Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --bg-deep: #050505;
            --panel-bg: #111115;
            --border: #2b2b30;
            --text-main: #f0f0f2;
            --text-dim: #71717a;
            --safety-car: #ffd700;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Navigation --- */
        aside {
            width: 380px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .system-meta {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(to right, #e1060022, transparent);
        }

        .brand-title { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; color: var(--f1-red); }
        .system-status { font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .status-dot { width: 6px; height: 6px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }

        .search-container { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .input-group label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        input, select {
            width: 100%;
            background: #1c1c21;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .btn-fetch {
            background: var(--f1-red);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-fetch:hover { filter: brightness(1.2); }

        #session-results {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .session-card {
            background: #1c1c21;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .session-card:hover { border-color: var(--f1-red); background: #25252b; }
        .session-card h4 { margin: 0; font-size: 0.9rem; }
        .session-card p { margin: 5px 0 0; font-size: 0.75rem; color: var(--text-dim); }

        /* --- Main Dashboard --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Race Control Header */
        .control-bar {
            height: 80px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }

        .playback-engine {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #1c1c21;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        #lap-counter { font-family: 'JetBrains Mono'; font-size: 1.5rem; font-weight: 700; color: var(--f1-red); }

        /* Grid Layout */
        .dashboard-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 1fr 300px;
            gap: 15px;
            padding: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 20px;
            background: #1c1c21;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .panel-content { flex: 1; overflow-y: auto; padding: 10px; }

        /* Custom Table Styling */
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        th { text-align: left; color: var(--text-dim); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 8px; border-bottom: 1px solid #1c1c21; }

        .row-driver { display: flex; align-items: center; gap: 10px; }
        .pos-num { width: 25px; height: 25px; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; border-radius: 3px; }
        .pos-1 { background: var(--f1-red); }

        /* Track Messages */
        .message-log { display: flex; flex-direction: column-reverse; gap: 8px; }
        .log-entry { padding: 8px; border-left: 3px solid var(--f1-red); background: #1c1c21; font-size: 0.75rem; }
        .log-time { color: var(--text-dim); font-size: 0.65rem; margin-bottom: 4px; }

        /* Progress Bar */
        #timeline-slider { width: 300px; accent-color: var(--f1-red); }
    </style>
</head>
<body>

    <aside>
        <div class="system-meta">
            <div class="brand-title">RACE_CONTROL_V4</div>
            <div class="system-status"><div class="status-dot"></div> TELEMETRY_LINK_ACTIVE</div>
        </div>

        <div class="search-container">
            <div class="input-group">
                <label>Archive Year</label>
                <select id="year-select">
                    <option value="2024">2024 Season</option>
                    <option value="2023" selected>2023 Season</option>
                </select>
            </div>
            <div class="input-group">
                <label>Circuit Location</label>
                <input type="text" id="loc-input" placeholder="e.g. Silverstone">
            </div>
            <button class="btn-fetch" id="btn-search">SEARCH ARCHIVES</button>
        </div>

        <div id="session-results">
            </div>
    </aside>

    <main>
        <div class="control-bar">
            <div>
                <h2 id="active-event" style="margin:0; font-size: 1.1rem;">AWAITING SELECTION</h2>
                <span id="active-circuit" style="font-size: 0.7rem; color: var(--text-dim);">No active telemetry link</span>
            </div>

            <div class="playback-engine">
                <button id="btn-play" class="btn-fetch" style="padding: 8px 15px;">PLAY</button>
                <div id="lap-counter">LAP 0</div>
                <input type="range" id="timeline-slider" value="0">
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="panel" style="grid-row: span 2;">
                <div class="panel-header">
                    <span>Live Classification</span>
                    <span style="color: var(--f1-red);">Real-Time Intervals</span>
                </div>
                <div class="panel-content">
                    <table id="leaderboard">
                        <thead>
                            <tr>
                                <th>POS</th>
                                <th>DRIVER</th>
                                <th>GAP TO LEADER</th>
                                <th>LAST LAP</th>
                                <th>TYRE</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Race Control Messages</div>
                <div class="panel-content message-log" id="log">
                    <div class="log-entry">SYSTEM_READY: Select session to stream historical data.</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Telemetry Stream</div>
                <div class="panel-content">
                    <table id="telemetry-table">
                        <thead>
                            <tr>
                                <th>LAP</th>
                                <th>S1</th>
                                <th>S2</th>
                                <th>S3</th>
                                <th>Pace</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
